name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:

jobs:
  generate:
    permissions:
      contents: write

    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: LumaGonzaga
          outputs: |
            dist/snake.svg?palette=github-light&color_snake=#FFB5C0&color_dots=#ebedf0,#ffd6dd,#ffb5c0,#ff8fa3,#fb6f92
            dist/snake-dark.svg?palette=github-dark&color_snake=#FFB5C0&color_dots=#161b22,#3d1f26,#FFB5C0,#ff8fa3,#fb6f92

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
